name: Build Desktop Executables

on:
  push:
    paths:
      - 'game.py'
      - 'game.spec'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pygame-ce

      - name: Build with PyInstaller
        run: pyinstaller game.spec

      - name: Archive Windows executable
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/clash-in-space.exe -DestinationPath clash-in-space-windows.zip

      - name: Archive Linux executable
        if: runner.os == 'Linux'
        run: tar -czvf clash-in-space-linux.tar.gz -C dist clash-in-space

      - name: Archive macOS application
        if: runner.os == 'macOS'
        run: zip -r clash-in-space-macos.zip dist/clash-in-space.app

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: clash-in-space-${{ runner.os }}
          path: clash-in-space-*.zip
            clash-in-space-*.tar.gz
